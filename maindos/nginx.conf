user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
	worker_connections 768;
	# multi_accept on;
}

http {
    ##
    # Basic Settings
    ##
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;

    # SUPPRIMEZ les lignes suivantes qui font doublon :
    # include /etc/nginx/mime.types;           <-- À supprimer
    # default_type application/octet-stream;   <-- À supprimer

    ##
    # Gzip Settings
    ##
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    ##
    # Virtual Host Configs
    ##
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;

    server {
        listen 49250;
        server_name 88.178.231.215;
        root /var/www/dev-project/maindos/AppBundle;

        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location ~ \.js$ {
            # On s'assure que le JS est bien servi avec le bon type
            types { application/javascript js; }
            default_type application/javascript;
        }
    }
}



